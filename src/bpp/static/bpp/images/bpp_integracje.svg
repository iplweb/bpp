<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 650" width="1240" height="650" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Schemat architektury wymiany danych BPP: po lewej wejscia (Pracownicy, PBN, CrossRef, Web of Science, DSpace), w centrum BPP, po prawej wyjscia (PBN, OAI-PMH, API, DSpace)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="inGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <filter id="hubShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4338ca" flood-opacity="0.45"/>
    </filter>
    <marker id="arrowIn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/>
    </marker>
    <marker id="arrowOut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="650" fill="url(#bg)"/>

  <text x="620" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">Architektura wymiany danych BPP</text>
  <text x="620" y="70" text-anchor="middle" font-size="14" fill="#475569">BPP jako centralny punkt przyjmowania i obróbki publikacji na uczelni</text>

  <text x="165" y="104" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="2" fill="#0369a1">WEJŚCIE · INPUT</text>
  <text x="1075" y="104" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="2" fill="#15803d">WYJŚCIE · OUTPUT</text>

  <!-- input arrows (left boxes -> hub) -->
  <g fill="none" stroke="#0284c7" stroke-width="2.5">
    <path d="M270,154 C390,154 400,288 510,288" marker-end="url(#arrowIn)"/>
    <path d="M270,244 C390,244 405,318 510,318" marker-end="url(#arrowIn)"/>
    <path d="M270,334 C390,334 405,344 510,344" marker-end="url(#arrowIn)"/>
    <path d="M270,424 C390,424 405,372 510,372" marker-end="url(#arrowIn)"/>
    <path d="M270,514 C390,514 400,402 510,402" marker-end="url(#arrowIn)"/>
  </g>

  <!-- output arrows (hub -> right boxes) -->
  <g fill="none" stroke="#16a34a" stroke-width="2.5">
    <path d="M730,292 C850,292 855,180 965,180" marker-end="url(#arrowOut)"/>
    <path d="M730,322 C850,322 855,296 965,296" marker-end="url(#arrowOut)"/>
    <path d="M730,356 C850,356 855,412 965,412" marker-end="url(#arrowOut)"/>
    <path d="M730,386 C850,386 855,528 965,528" marker-end="url(#arrowOut)"/>
  </g>

  <!-- INPUT boxes -->
  <g filter="url(#soft)">
    <g>
      <rect x="60" y="125" width="210" height="58" rx="12" fill="url(#inGrad)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="165" y="160" text-anchor="middle" font-size="19" font-weight="600" fill="#0c4a6e">Pracownicy</text>
    </g>
    <g>
      <rect x="60" y="215" width="210" height="58" rx="12" fill="url(#inGrad)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="165" y="250" text-anchor="middle" font-size="19" font-weight="600" fill="#0c4a6e">PBN</text>
    </g>
    <g>
      <rect x="60" y="305" width="210" height="58" rx="12" fill="url(#inGrad)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="165" y="340" text-anchor="middle" font-size="19" font-weight="600" fill="#0c4a6e">CrossRef</text>
    </g>
    <g>
      <rect x="60" y="395" width="210" height="58" rx="12" fill="url(#inGrad)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="165" y="430" text-anchor="middle" font-size="19" font-weight="600" fill="#0c4a6e">Web of Science</text>
    </g>
    <g>
      <rect x="60" y="485" width="210" height="58" rx="12" fill="url(#inGrad)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="165" y="520" text-anchor="middle" font-size="19" font-weight="600" fill="#0c4a6e">DSpace</text>
    </g>
  </g>

  <!-- OUTPUT boxes -->
  <g filter="url(#soft)">
    <g>
      <rect x="970" y="151" width="210" height="58" rx="12" fill="url(#outGrad)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="1075" y="186" text-anchor="middle" font-size="19" font-weight="600" fill="#14532d">PBN</text>
    </g>
    <g>
      <rect x="970" y="267" width="210" height="58" rx="12" fill="url(#outGrad)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="1075" y="302" text-anchor="middle" font-size="19" font-weight="600" fill="#14532d">OAI-PMH</text>
    </g>
    <g>
      <rect x="970" y="383" width="210" height="58" rx="12" fill="url(#outGrad)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="1075" y="418" text-anchor="middle" font-size="19" font-weight="600" fill="#14532d">API</text>
    </g>
    <g>
      <rect x="970" y="499" width="210" height="58" rx="12" fill="url(#outGrad)" stroke="#16a34a" stroke-width="1.5"/>
      <text x="1075" y="534" text-anchor="middle" font-size="19" font-weight="600" fill="#14532d">DSpace</text>
    </g>
  </g>

  <!-- HUB -->
  <g filter="url(#hubShadow)">
    <rect x="510" y="254" width="220" height="170" rx="22" fill="url(#hubGrad)"/>
  </g>
  <text x="620" y="332" text-anchor="middle" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="2">BPP</text>
  <text x="620" y="362" text-anchor="middle" font-size="12.5" fill="#e0e7ff">Bibliografia Publikacji</text>
  <text x="620" y="380" text-anchor="middle" font-size="12.5" fill="#e0e7ff">Pracowników</text>
  <text x="620" y="404" text-anchor="middle" font-size="11.5" font-weight="600" fill="#c7d2fe" letter-spacing="1">CENTRALNY HUB DANYCH</text>
</svg>
