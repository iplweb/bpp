{% extends "admin/change_form.html" %}

{% block submit_buttons_bottom %}
    {{ block.super }}
    <script type="text/javascript">
        (function($) {
            pub_id = $("#id_autorzy_set-__prefix__-rekord").val()

            if (pub_id) {
                btn = $("input[name=_continue]");
                tamze = $("<input/>")
                    .attr("id", "tamze")
                    .attr("class", "grp-button")
                    .attr("type", "button")
                    .attr("value", "Tamże");

                toz = tamze.clone()
                    .attr("id", "toz")
                    .attr("value", "Toż");

                btn.parent().parent().append($("<li/>").append(tamze));
                btn.parent().parent().append($("<li/>").append(toz));

                $("#tamze").click(function () {
                    data = {
                        "informacje": $("textarea[name=informacje]").val(),
                        "uwagi": $("textarea[name=uwagi]").val(),
                        "rok": $("input[name=rok]").val(),

                        "punkty_kbn": $("input[name=punkty_kbn]").val(),
                        "impact_factor": $("input[name=impact_factor]").val(),
                        "index_copernicus": $("input[name=index_copernicus]").val(),
                        "punktacja_wewnetrzna": $("input[name=punktacja_wewnetrzna]").val(),

                        "kc_punkty_kbn": $("input[name=kc_punkty_kbn]").val(),
                        "kc_impact_factor": $("input[name=kc_impact_factor]").val(),
                        "kc_index_copernicus": $("input[name=kc_index_copernicus]").val()
                    }

                    location.href = "../../add/?" + $.param(data);
                });

                $("#toz").click(function () {
                    if (confirm('Utworzysz kopię tego rekordu. Czy kontynuować?')) {
                        // Klonowanie to mutacja — POST + token CSRF (dawniej
                        // GET-nawigacja). Formularz budujemy natywnym DOM (nie
                        // jQuery-z-HTML-stringa), a submit nawiguje jak
                        // location.href; serwer zwraca redirect na świeżą kopię.
                        // Ten sam UX, zero dodatkowych kliknięć.
                        // Ukośnik na końcu wymagany: wzorzec to toz/<pk>/, a
                        // APPEND_SLASH nie przekieruje POST-a (zgubiłby ciało).
                        var tozForm = document.createElement("form");
                        tozForm.method = "post";
                        // pub_id to PK (liczba). parseInt sanitizuje wartość
                        // czytaną z DOM (.val()), żeby nie przenosiła meta-znaków
                        // do URL-a — usuwa CodeQL js/xss-through-dom u źródła.
                        tozForm.action = "../../toz/" + parseInt(pub_id, 10) + "/";
                        var tozCsrf = document.createElement("input");
                        tozCsrf.type = "hidden";
                        tozCsrf.name = "csrfmiddlewaretoken";
                        tozCsrf.value = document.querySelector(
                            "input[name=csrfmiddlewaretoken]").value;
                        tozForm.appendChild(tozCsrf);
                        document.body.appendChild(tozForm);
                        tozForm.submit();
                    }
                });
            }
        }(django.jQuery));
    </script>
{% endblock %}
