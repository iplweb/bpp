[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "django-pbn-client"
version = "0.1.0"
description = "Django persistence helpers for data downloaded from PBN"
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Michał Pasternak", email = "michal.dtz@gmail.com" },
]
dependencies = [
    "Django>=5.2,<5.3",
    "pbn-client>=0.1.0,<0.2",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1,<10",
    "pytest-django>=4.9,<5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/django_pbn_client"]

[tool.pytest.ini_options]
addopts = "-ra"
pythonpath = ["src", "tests"]
DJANGO_SETTINGS_MODULE = "package_test_settings"
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]
