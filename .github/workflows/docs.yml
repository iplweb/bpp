name: Docs

# Buduje dokumentacje MkDocs Material w trybie --strict jako PR check.
# Workflow nie konsumuje zadnych nieZaufanych inputow (issue/PR titles,
# commit messages), wiec wzorce z https://github.blog/security/...
# nie maja tu zastosowania.

on:
  push:
    branches:
      - dev
      - master
    paths:
      - docs/**
      - mkdocs.yml
      - .readthedocs.yaml
      - .github/workflows/docs.yml
  pull_request:
    branches:
      - dev
    paths:
      - docs/**
      - mkdocs.yml
      - .readthedocs.yaml
      - .github/workflows/docs.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs + plugins
        run: pip install -r docs/requirements.txt

      - name: Build docs (strict mode)
        run: mkdocs build --strict --verbose

      - name: Upload built site as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: site/
          retention-days: 7
