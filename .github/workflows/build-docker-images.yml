name: Docker - oficjalne obrazy

on:
  push:
    branches:
      - master
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  pull_request:
    # Buduje, gdy PR ma label `docker-build` (patrz check-flag).
    # Typ `labeled` obsługuje moment dodania labela na już-pushniętym
    # commicie — build odpala się od razu, bez konieczności nowego pushu.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    # Ręczne wywołanie z GUI GitHub lub przez
    # `gh workflow run build-docker-images.yml --ref <branch>`.
    # Zawsze buduje, niezależnie od obecności .docker-build / labela.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-flag:
    # Guard job oszczędzający Docker Cloud Build minuty.
    # - master         : buduj zawsze (release flow)
    # - workflow_dispatch: buduj zawsze (świadomy trigger ręczny)
    # - pull_request z labelem `docker-build`: buduj przy każdym push
    #                      do PR-a (label żyje w metadanych PR-a,
    #                      nie trafia do kodu → bezpieczne przy mergu)
    # - feature/fix/hotfix: buduj tylko gdy w root repo jest plik
    #                      `.docker-build` (pusty, commitowany do
    #                      gałęzi wymagającej obrazów pre-prod).
    #
    # Aby włączyć budowanie obrazów na branchu przez label PR-a:
    #   gh pr edit <PR#> --add-label docker-build
    # Aby wyłączyć:
    #   gh pr edit <PR#> --remove-label docker-build
    # Alternatywnie, przez flagę w drzewie (uwaga: ryzyko merge'u do mastera):
    #   touch .docker-build && git add .docker-build && git commit
    # Budowanie ad-hoc bez commitowania flagi / ustawiania labela:
    #   gh workflow run build-docker-images.yml --ref <branch>
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          HAS_DOCKER_BUILD_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'docker-build') }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker build — trigger ręczny (workflow_dispatch)"
          elif [ "$EVENT_NAME" = "pull_request" ] && [ "$HAS_DOCKER_BUILD_LABEL" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker build — PR ma label 'docker-build'"
          elif [ "$REF_NAME" = "master" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker build — push na master (release)"
          elif [ -f ".docker-build" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker build włączone przez obecność .docker-build w root"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Pomijam Docker build — brak .docker-build w root repo oraz labela 'docker-build' na PR"
          fi

  docker:
    needs: check-flag
    if: needs.check-flag.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx Action
        uses: docker/setup-buildx-action@v4
        with:
          version: "lab:latest"
          driver: cloud
          endpoint: "iplweb/bpp"
          cache-binary: true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from Makefile
        id: version
        run: echo "version=$(grep '^DOCKER_VERSION=' Makefile | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Compute Docker tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          BASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "$REF_NAME" = "master" ]; then
            echo "docker_tag=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "tag_latest=true" >> $GITHUB_OUTPUT
          else
            BRANCH_TAG=$(echo "$REF_NAME" \
              | sed 's/[^a-zA-Z0-9._-]/-/g' \
              | tr '[:upper:]' '[:lower:]')
            echo "docker_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT
            echo "tag_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push all images
        run: |
          docker buildx bake \
            base appserver workerserver \
            beatserver authserver denorm-queue \
            --file docker-bake.hcl \
            --set "base.args.GIT_SHA=${GIT_SHA}" \
            --set '*.platform=linux/amd64' \
            --allow=fs.read=/tmp \
            --allow=fs.write=/tmp
        env:
          GIT_SHA: ${{ github.sha }}
          DOCKER_VERSION: ${{ steps.tag.outputs.docker_tag }}
          TAG_LATEST: ${{ steps.tag.outputs.tag_latest }}
          PUSH: "true"

      - name: Trivy image scan (report-only)
        continue-on-error: true
        env:
          DOCKER_VERSION: ${{ steps.tag.outputs.docker_tag }}
        run: |
          set -u
          images=(
            iplweb/bpp_base
            iplweb/bpp_appserver
            iplweb/bpp_workerserver
            iplweb/bpp_beatserver
            iplweb/bpp_authserver
            iplweb/bpp_denorm_queue
          )
          for img in "${images[@]}"; do
            echo "::group::Trivy scan ${img}:${DOCKER_VERSION}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image \
                --severity CRITICAL,HIGH \
                --exit-code 0 \
                --ignore-unfixed \
                --no-progress \
                "${img}:${DOCKER_VERSION}" || true
            echo "::endgroup::"
          done
