name: Refresh baseline pg_dump

# Regenerates baseline-sql/baseline.sql + baseline.meta.json after
# any push to dev that touches a migration file. The workflow uses the
# django_pg_baseline management commands, which spin up an isolated
# Postgres via testcontainers (iplweb/bpp_dbserver:psql-16.13).
#
# Manual trigger via the Actions tab is also enabled.

on:
  push:
    branches:
      - dev
    paths:
      - 'src/**/migrations/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install system build deps
        # uv sync builds several wheels from source (pycairo via
        # svglib/xhtml2pdf, psycopg2, python-ldap, cryptography) that need
        # native headers. Reuse docker/bpp_base/build.txt so the package
        # list stays in sync with the runtime/test images and tests.yml.
        run: |
          sudo apt-get update
          xargs -a docker/bpp_base/build.txt sudo apt-get install -y

      - name: Install Python deps (with baseline-rebuild extra)
        run: uv sync --frozen --no-install-project --extra baseline-rebuild

      - name: Pre-pull dbserver image
        run: docker pull iplweb/bpp_dbserver:psql-16.13 || true

      - name: Rebuild baseline
        env:
          DJANGO_BPP_SKIP_DOTENV: "1"
        run: uv run python src/manage.py baseline_rebuild

      - name: Commit refreshed baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- baseline-sql/baseline.sql baseline-sql/baseline.meta.json; then
            echo "No baseline changes to commit"
            exit 0
          fi
          git add baseline-sql/baseline.sql baseline-sql/baseline.meta.json
          git commit -m "chore(baseline): refresh pg_dump after migration change [skip ci]"
          git push origin HEAD:dev
