name: Refresh baseline pg_dump

# Regenerates baseline/baseline.sql + baseline/baseline.meta.json after
# any push to dev that touches a migration file. The workflow:
#   1. Checks out the repo
#   2. Spins up the same iplweb/bpp_dbserver image used everywhere
#   3. Runs `migrate` against an empty DB
#   4. pg_dump's the result (FROM INSIDE THE CONTAINER, so the dump's
#      Postgres major version always matches the server)
#   5. Regenerates baseline.meta.json
#   6. Commits both files back to dev with [skip ci]
#
# Manual trigger via the Actions tab is also enabled.

on:
  push:
    branches:
      - dev
    paths:
      - 'src/**/migrations/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build dbserver image
        run: docker compose -f docker-compose.baseline.yml build db

      - name: Start baseline postgres
        run: docker compose -f docker-compose.baseline.yml up -d db

      - name: Wait for postgres
        timeout-minutes: 2
        run: |
          for _ in $(seq 1 60); do
            if docker compose -f docker-compose.baseline.yml exec -T db \
                pg_isready -U bpp -p 55433 -d bpp_baseline >/dev/null 2>&1; then
              echo "PostgreSQL ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Install Python deps
        run: uv sync --frozen

      - name: Run migrate against baseline DB
        env:
          DJANGO_BPP_DB_NAME: bpp_baseline
          DJANGO_BPP_DB_HOST: 127.0.0.1
          DJANGO_BPP_DB_PORT: "55433"
          DJANGO_BPP_DB_USER: bpp
          DJANGO_BPP_DB_PASSWORD: password
        run: uv run python src/manage.py migrate --noinput

      - name: pg_dump baseline (from inside container)
        run: |
          docker compose -f docker-compose.baseline.yml exec -T db \
            pg_dump -U bpp -p 55433 -d bpp_baseline \
            --no-owner --no-acl --no-privileges --no-comments \
            --format=plain --encoding=UTF8 \
            --exclude-table-data=django_session \
            --exclude-table-data='django_cache*' \
            --exclude-table-data=dbtemplates_template \
            --exclude-table-data='easy_thumbnails_*' \
            > baseline/baseline.sql
          ls -lh baseline/baseline.sql

      - name: Write baseline.meta.json
        env:
          DJANGO_BPP_DB_NAME: bpp_baseline
          DJANGO_BPP_DB_HOST: 127.0.0.1
          DJANGO_BPP_DB_PORT: "55433"
          DJANGO_BPP_DB_USER: bpp
          DJANGO_BPP_DB_PASSWORD: password
        run: uv run python baseline/write_meta.py

      - name: Stop baseline postgres
        if: always()
        run: docker compose -f docker-compose.baseline.yml down -v

      - name: Commit refreshed baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- baseline/baseline.sql baseline/baseline.meta.json; then
            echo "No baseline changes to commit"
            exit 0
          fi
          git add baseline/baseline.sql baseline/baseline.meta.json
          git commit -m "chore(baseline): refresh pg_dump after migration change [skip ci]"
          git push origin HEAD:dev
