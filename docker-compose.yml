# BPP Docker Deployment - Development Configuration
#
# Uwaga uwaga: ten docker-compose.yml to deweloperska konfiguracja uruchamiania BPP.
# Odsłania wszystkie porty. NIE używać w produkcji. Zostaliście ostrzeżeni.

services:

  # ── Database ────────────────────────────────────────────────────────────

  db:
    # Obraz budowany w osobnym repo: https://github.com/iplweb/bpp-dbserver
    image: iplweb/bpp_dbserver:psql-16.13
    restart: always
    environment:
      - PGPORT=${DJANGO_BPP_DB_PORT:-5432}
      - POSTGRES_DB=${DJANGO_BPP_DB_NAME:-bpp}
      - POSTGRES_USER=${DJANGO_BPP_DB_USER:-bpp}
      # Ustaw na "1" dla maksymalnej wydajności (wyłącza fsync, synchronous_commit)
      # TYLKO dla developmentu/testów! NIE UŻYWAĆ W PRODUKCJI!
      - POSTGRESQL_UNSAFE_BUT_FAST=1
      # Powiększona tabela locków — xdist z wieloma workerami tworzy/dropuje
      # setki tabel i indeksów w jednej transakcji. Default 64 jest za mały.
      - POSTGRESQL_MAX_LOCKS_PER_TRANSACTION=512
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      # Baseline pg_dump ładowany przez postgresowy entrypoint przy
      # pierwszej inicjalizacji bazy (tj. gdy volume postgresql_data jest
      # pusty). Skraca bootstrap z ~minut migracji do sekund.
      # Patrz: baseline-sql/README.md.
      - ./baseline-sql/baseline.sql:/docker-entrypoint-initdb.d/baseline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DJANGO_BPP_DB_USER:-bpp}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - ${DJANGO_BPP_DB_PORT:-5432}:${DJANGO_BPP_DB_PORT:-5432}

  # ── Infrastructure ─────────────────────────────────────────────────────

  redis:
    image: redis:latest
    restart: always
    command: redis-server --loglevel warning --port ${DJANGO_BPP_REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${DJANGO_BPP_REDIS_PORT:-6379}", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    ports:
      - ${DJANGO_BPP_REDIS_PORT:-6379}:${DJANGO_BPP_REDIS_PORT:-6379}

  # ── Application ────────────────────────────────────────────────────────

  # Wszystkie serwisy aplikacyjne (appserver/celerybeat/workerserver*/denorm-queue)
  # uzywaja tego samego, lokalnie budowanego obrazu `bpp_testserver:dev` —
  # stage `testserver` z docker/bpp_base/Dockerfile. Obraz NIE jest publikowany
  # do registry (brak go w docker-bake.hcl). Zmieniasz pyproject.toml/uv.lock?
  # `docker compose build` rebuilduje obraz raz dla wszystkich serwisow.
  appserver:
    image: bpp_testserver:dev
    build: &testserver-build
      context: .
      dockerfile: docker/bpp_base/Dockerfile
      target: testserver
    restart: always
    env_file:
      - path: .env.docker
        required: true
      - path: .env
        required: false
    environment:
      - ENABLE_AUTORELOAD_ON_CODE_CHANGE=${ENABLE_AUTORELOAD_ON_CODE_CHANGE:-1}
      - DJANGO_BPP_CSRF_EXTRA_ORIGINS=https://bpp.localnet:10443,https://localhost:10443
      # DJANGO_BPP_HTML2DOCX_URL jest w .env.docker (współdzielone z workerami).
    entrypoint: ["/entrypoint-appserver.sh"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    volumes:
      - ./src:/app/src
      - ./src/django_bpp/staticroot:/staticroot
      - media:/mediaroot
    ports:
      - ${DJANGO_BPP_PORT_APP:-8000}:8000

  # Usługa konwersji HTML->DOCX (fallback gdy pandoc zawiedzie). Sidecar HTTP
  # zamiast docker.sock — appserver POST-uje HTML, dostaje docx. Obraz budowany
  # w osobnym repo: https://github.com/mpasternak/html2docx
  html2docx:
    image: iplweb/html2docx:latest
    restart: always
    # Port 3030 (default obrazu); nadpisywalny env HTML2DOCX_PORT.
    # W dev odsłaniamy port dla debugowania; w produkcji NIE publikować.
    ports:
      - ${DJANGO_BPP_HTML2DOCX_PORT:-3030}:3030


  # ── Workers ────────────────────────────────────────────────────────────

  celerybeat:
    image: bpp_testserver:dev
    build: *testserver-build
    env_file:
      - path: .env.docker
        required: true
      - path: .env
        required: false
    environment:
      - ENABLE_AUTORELOAD_ON_CODE_CHANGE=${ENABLE_AUTORELOAD_ON_CODE_CHANGE:-1}
    entrypoint: ["/entrypoint-beatserver.sh"]
    restart: always
    volumes:
      - ./src:/app/src
      - ./src/django_bpp/staticroot:/staticroot
      - media:/mediaroot
    depends_on:
      redis:
        condition: service_healthy
      appserver:
        condition: service_healthy

  workerserver:
    image: bpp_testserver:dev
    build: *testserver-build
    env_file:
      - path: .env.docker
        required: true
      - path: .env
        required: false
    environment:
      - ENABLE_AUTORELOAD_ON_CODE_CHANGE=${ENABLE_AUTORELOAD_ON_CODE_CHANGE:-1}
    entrypoint: ["/entrypoint-workerserver.sh"]
    restart: always
    # Mirror produkcyjnego HEALTHCHECK z docker/workerserver/Dockerfile:8.
    # Testserver stage celowo nie ma HEALTHCHECK (jest shared dla wszystkich
    # uslug, kazda ma inne wymagania) — musimy go dolozyc per-service tutaj.
    # $$HOSTNAME (escaped $) → docker compose passuje literalne $HOSTNAME do
    # shella w kontenerze, ktory rozwija to do nazwy hosta (= identifier workera).
    healthcheck:
      test: ["CMD-SHELL", "celery -A django_bpp.celery_tasks inspect ping --destination celery@$$HOSTNAME"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 5
    volumes:
      - ./src:/app/src
      - ./src/django_bpp/staticroot:/staticroot
      - media:/mediaroot
    depends_on:
      # Musi czekać na appserver, gdyż appserver aktualizuje ewentualnie baze danych.
      # Czy nawet w ogóle ją buduje...
      redis:
        condition: service_healthy
      appserver:
        condition: service_healthy

  workerserver-status:
    image: bpp_testserver:dev
    build: *testserver-build
    env_file:
      - path: .env.docker
        required: true
      - path: .env
        required: false
    entrypoint: ["/entrypoint-workerserver.sh"]
    command: status
    depends_on:
      workerserver:
        condition: service_healthy
    profiles: ['manual']

  denorm-queue:
    # run only SINGLE service, this is only a mechanism to pass
    # PostgreSQL LISTEN to Celery queue
    image: bpp_testserver:dev
    build: *testserver-build
    env_file:
      - path: .env.docker
        required: true
      - path: .env
        required: false
    environment:
      - ENABLE_AUTORELOAD_ON_CODE_CHANGE=${ENABLE_AUTORELOAD_ON_CODE_CHANGE:-1}
    entrypoint: ["/entrypoint-denorm-queue.sh"]
    restart: always
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      workerserver:
        condition: service_healthy

  # ── Monitoring (start with: docker compose --profile monitoring up) ────

  flower:
    profiles: ['monitoring']
    image: mher/flower:2.0
    restart: always
    environment:
      - CELERY_BROKER_URL=redis://redis:${DJANGO_BPP_REDIS_PORT:-6379}/${DJANGO_BPP_REDIS_DB_BROKER:-1}
      - FLOWER_PORT=5555
      - FLOWER_URL_PREFIX=/flower
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - 5555
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    profiles: ['monitoring']
    image: amir20/dozzle:latest
    restart: always
    environment:
      - DOZZLE_BASE=/dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - 8080

  loki:
    profiles: ['monitoring']
    image: grafana/loki:3.4.1
    restart: always
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    profiles: ['monitoring']
    image: grafana/grafana:latest
    restart: always
    env_file:
      - path: .env.docker
        required: true
      - path: .env
        required: false
    environment:
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_LOG_LEVEL=warn
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_HEADERS=Email:X-WEBAUTH-EMAIL Name:X-WEBAUTH-NAME
    volumes:
      - grafana_data:/var/lib/grafana
    expose:
      - 3000
    depends_on:
      - loki

  alloy:
    profiles: ['monitoring']
    image: grafana/alloy:latest
    restart: always
    command: >
      run /etc/alloy/config.alloy
      --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - loki

volumes:
  postgresql_data:
  redis_data:
  media:
  grafana_data:
