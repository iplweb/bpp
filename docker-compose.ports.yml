# BPP Docker Deployment - Port Exposure
# Exposes service ports to the host for development access.
# NOT included in AI/agent configurations.

services:
  db:
    ports:
      - ${DJANGO_BPP_DB_PORT:-5432}:${DJANGO_BPP_DB_PORT:-5432}

  redis:
    ports:
      - ${DJANGO_BPP_REDIS_PORT:-6379}:${DJANGO_BPP_REDIS_PORT:-6379}

  rabbitmq:
    ports:
      - ${DJANGO_BPP_RABBITMQ_PORT:-5672}:${DJANGO_BPP_RABBITMQ_PORT:-5672}
      - ${DJANGO_BPP_PORT_RABBITMQ_MGMT:-15672}:15672 # Management UI

  appserver:
    ports:
      - ${DJANGO_BPP_PORT_APP:-8000}:8000

  webserver:
    ports:
      - ${DJANGO_BPP_PORT_HTTP:-1080}:80
      - ${DJANGO_BPP_PORT_HTTPS:-10443}:443
