repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      # Keep in sync with `ruff` pin in pyproject.toml's `[dev]` extra.
      # A lower pin here caused pre-commit to accept an I001 layout that
      # ruff 0.15.x (used by CI) rejected — the diff was invisible
      # locally until GitHub Actions failed.
      rev: v0.15.10
      hooks:
        - id: ruff
          args: ["--fix", "--exit-non-zero-on-fix"]
        - id: ruff-format

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: 'v6.0.0'
      hooks:
        -   id: check-yaml
        -   id: check-toml
        -   id: end-of-file-fixer
            exclude: ^src/baseline-sql/baseline\.sql$
        -   id: trailing-whitespace
            exclude: ^src/baseline-sql/baseline\.sql$
        -   id: mixed-line-ending
            exclude: ^src/baseline-sql/baseline\.sql$
        -   id: check-added-large-files
            args: ['--maxkb=500']
        -   id: check-merge-conflict
        -   id: check-case-conflict
        -   id: debug-statements

    - repo: local
      hooks:
        - id: trufflehog
          name: TruffleHog
          description: Detect secrets in your data.
          entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail --no-update'
          language: system
          stages: ["pre-commit", "pre-push"]

#    - repo: https://github.com/gitguardian/ggshield
#      rev: v1.43.0
#      hooks:
#        - id: ggshield
#          language: python
#          stages: [commit]

    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.8
      hooks:
        - id: actionlint

    # zizmor: security audyt workflowów GitHub Actions. Wykrywa m.in.
    # nie-pinowane akcje, niebezpieczne triggery (pull_request_target),
    # injection w expressionach, zbyt szerokie permissions. Praktyka #13
    # z lirantal/pypi-security-best-practices.
    - repo: https://github.com/zizmorcore/zizmor-pre-commit
      rev: v1.24.1
      hooks:
        - id: zizmor

