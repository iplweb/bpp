repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      # Keep in sync with `ruff` pin in pyproject.toml's `[dev]` extra.
      # A lower pin here caused pre-commit to accept an I001 layout that
      # ruff 0.15.x (used by CI) rejected — the diff was invisible
      # locally until GitHub Actions failed.
      rev: v0.15.10
      hooks:
        - id: ruff
          args: ["--fix", "--exit-non-zero-on-fix"]
        - id: ruff-format

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: 'v6.0.0'
      hooks:
        -   id: check-yaml
        -   id: check-toml
        -   id: end-of-file-fixer
            exclude: ^src/baseline-sql/baseline\.sql$
        -   id: trailing-whitespace
            exclude: ^src/baseline-sql/baseline\.sql$
        -   id: mixed-line-ending
            exclude: ^src/baseline-sql/baseline\.sql$
        -   id: check-added-large-files
            args: ['--maxkb=500']
        -   id: check-merge-conflict
        -   id: check-case-conflict
        -   id: debug-statements

    - repo: local
      hooks:
        - id: trufflehog
          name: TruffleHog
          description: Detect secrets in your data.
          entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail --no-update'
          language: system
          stages: ["pre-commit", "pre-push"]

        # Egzekwuje wheel-only dla wszystkich zewnetrznych dep (praktyka #1
        # z pypi-security-best-practices). Failuje gdy ktorakolwiek dep
        # wymaga build z source (sdist - wektor wykonania zlosliwego kodu
        # w setup.py). Dlaczego nie globalne `no-build = true` w
        # pyproject.toml: blokowaloby editable install workspace roota.
        - id: uv-lock-no-build
          name: uv lock --check --no-build (wheel-only policy)
          description: Verify all third-party deps have prebuilt wheels.
          entry: uv lock --check --no-build
          language: system
          files: ^(pyproject\.toml|uv\.lock)$
          pass_filenames: false

