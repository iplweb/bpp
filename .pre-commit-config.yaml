repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      # Keep in sync with `ruff` pin in pyproject.toml's `[dev]` extra.
      # A lower pin here caused pre-commit to accept an I001 layout that
      # ruff 0.15.x (used by CI) rejected — the diff was invisible
      # locally until GitHub Actions failed.
      rev: v0.15.12
      hooks:
        - id: ruff
          args: ["--fix", "--exit-non-zero-on-fix"]
        - id: ruff-format

    # djlint: walidacja strukturalna templatów HTML/Django. Konfiguracja
    # w [tool.djlint] w pyproject.toml — egzekwujemy tylko reguły
    # strukturalne (H020 empty-tag-pair, H025 orphan-tag) ktore lapią
    # bugi rozjezdzajace minifier HTML; reszta wyciszona zeby pre-commit
    # nie blokowal istniejacego codebase.
    - repo: https://github.com/djlint/djLint
      rev: v1.36.4
      hooks:
        - id: djlint-django
          # --lint: tylko reguly strukturalne (H020/H025/H017 etc.),
          # bez sugestii reformatowania (--check by przepuszczal cale
          # diff-y indentacji na pre-commit, blokujac niezmienione pliki).
          args: ["--lint"]
          files: \.html$
          exclude: ^(node_modules/|.*/migrations/|.*/staticroot/|src/django_bpp/static/500\.html$|src/bpp/static/500\.html$)

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: 'v6.0.0'
      hooks:
        -   id: check-yaml
            # docker-compose.test.ci.yml uses Compose's `!reset` YAML
            # tag (Compose 2.4+) to drop volumes inherited from the
            # base file. PyYAML's safe loader doesn't know
            # Compose-specific tags, so check-yaml chokes on a file
            # that `docker compose config` parses fine.
            exclude: ^docker-compose\.test\.ci\.yml$
        -   id: check-toml
        -   id: end-of-file-fixer
            exclude: ^baseline-sql/baseline\.sql$
        -   id: trailing-whitespace
            exclude: ^baseline-sql/baseline\.sql$
        -   id: mixed-line-ending
            exclude: ^baseline-sql/baseline\.sql$
        -   id: check-added-large-files
            args: ['--maxkb=500']
            # .test_durations to celowy, generowany plik danych pytest-split
            # (~450K, rosnie z liczba testow — same dlugie node-id dominuja
            # rozmiar). Hook ma lapac PRZYPADKOWE bloby, nie ten plik.
            exclude: ^\.test_durations$
        -   id: check-merge-conflict
        -   id: check-case-conflict
        -   id: debug-statements

    - repo: local
      hooks:
        - id: trufflehog
          name: TruffleHog
          description: Detect secrets in your data.
          entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail --no-update'
          language: system
          stages: ["pre-commit", "pre-push"]

#    - repo: https://github.com/gitguardian/ggshield
#      rev: v1.43.0
#      hooks:
#        - id: ggshield
#          language: python
#          stages: [commit]

    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.8
      hooks:
        - id: actionlint

    # zizmor: security audyt workflowów GitHub Actions. Wykrywa m.in.
    # nie-pinowane akcje, niebezpieczne triggery (pull_request_target),
    # injection w expressionach, zbyt szerokie permissions. Praktyka #13
    # z lirantal/pypi-security-best-practices.
    - repo: https://github.com/zizmorcore/zizmor-pre-commit
      rev: v1.24.1
      hooks:
        - id: zizmor

