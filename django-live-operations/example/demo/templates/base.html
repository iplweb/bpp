<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}django-live-operations demo{% endblock %}</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  nav { margin-bottom: 1.5rem; }
  nav a { margin-right: 1rem; }
  #op-status { padding: 0.5rem; background: #eef; border-radius: 4px; margin: 0.5rem 0; }
  #op-progress { margin: 0.5rem 0; }
  progress { width: 100%; height: 1.2rem; }
  #op-log { font-family: monospace; font-size: 0.85rem; background: #f5f5f5;
            padding: 0.5rem; max-height: 12rem; overflow-y: auto; }
  #op-stages { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.75rem 0; }
  .stage-badge { padding: 0.25rem 0.6rem; border-radius: 3px; font-size: 0.85rem;
                 background: #ddd; }
  .stage-badge.active { background: #4af; color: #fff; }
  .stage-badge.done   { background: #4c4; color: #fff; }
  .stage-badge.failed { background: #e44; color: #fff; }
  #op-result { margin-top: 1rem; padding: 1rem; background: #f0fff0;
               border-left: 4px solid #4c4; }
  .liveop-connected    { color: #4c4; font-size: 0.8rem; }
  .liveop-disconnected { color: #e44; font-size: 0.8rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 0.4rem 0.7rem; text-align: left; }
  th { background: #f0f0f0; }
  .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 4px;
         cursor: pointer; border: none; background: #46a; color: #fff;
         text-decoration: none; font-size: 1rem; }
  .btn-danger { background: #c44; }
</style>
</head>
<body>
<nav>
  <a href="/">Operacje</a>
  <a href="/new/" class="btn">+ Nowy import</a>
</nav>
{% block content %}{% endblock %}
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"
        integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
        crossorigin="anonymous"></script>
{% load static %}
<script src="{% static 'live_operations/live-operations.js' %}"></script>
</body>
</html>
